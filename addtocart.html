<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add To Cart</title>

  <link rel="stylesheet" href="addtocart.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>

<body>

<div class="wrapper">

  <div id="header"></div>
 <div class="breadcrumb">

  <a href="index.html">
    Home
    <i class="fa-solid fa-angle-right"></i>
  </a>

  <a href="details.html">
    Clothing
    <i class="fa-solid fa-angle-right"></i>
  </a>

  <a href="#">
    Mens Wear
    <i class="fa-solid fa-angle-right"></i>
  </a>

  <a href="#">
    Summer Clothing
    <i class="fa-solid fa-angle-right"></i>
  </a>

</div>
  <h3 class="cart-header">
    Cart Items:
    <span id="cart-count">0</span>
  </h3>
 

  <section class="above-section">

    <!-- LEFT SIDE CART -->
  <section class="cart-product">

  <div id="cartContainer"></div>

  <!-- ACTION BUTTONS (BOTTOM LEFT SIDE) -->
  <div class="cart-top-actions">

     <a href="index.html" class="back-home-btn">
       <i class="fa-solid fa-arrow-left"></i>
       Back To Home
     </a>

     <button class="clear-cart-btn" onclick="clearCart()">
       <i class="fa-solid fa-trash"></i>
       Remove All Products
     </button>

  </div>

</section>
    <!-- RIGHT SIDE -->
    <aside class="right-side">

      <section class="coupon">
        <h4>Have a coupon?</h4>
        <div class="coupon-input">
          <input type="text" placeholder="Add Coupon">
          <button>Apply</button>
        </div>
      </section>

      <section class="checkout">

        <div>
          <h5>Subtotal</h5>
          <p id="subtotal">$0</p>
        </div>

        <div>
          <h5>Discount</h5>
          <p>-$0.00</p>
        </div>

        <div>
          <h5>Tax</h5>
          <p>$0.00</p>
        </div>

        <hr>

        <div class="total">
          <h4>Total:</h4>
          <p id="total">$0</p>
        </div>

        <button>Checkout</button>

      </section>

    </aside>

  </section>
<div class="discount-card">
    
    <div class="left-content">
        <h2>Super Discount on Orders Over $100</h2>
        <p>Discover amazing deals on premium products with fast delivery and secure shopping.</p>
    </div>

    <div class="right-content">
        <button>Shop Now</button>
    </div>
 
</div>
  <div id="footer"></div>

</div>

<script src="products.js"></script>
<script src="addtocart.js"></script>

</body>
</html>
