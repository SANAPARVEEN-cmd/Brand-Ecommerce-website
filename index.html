<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brand Ecommerce</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    .page-wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #content {
      flex: 1; /* pushes footer down */
    }
  </style>
</head>
<body>

<div class="page-wrapper">

  <!-- HEADER -->
  <div id="header"></div>

  <!-- MAIN CONTENT -->
  <div id="content">
    <h1>Home Page Content</h1>
  </div>

  <!-- FOOTER -->
  <div id="footer"></div>

</div>

<script>
  fetch("header.html")
    .then(res => res.text())
    .then(data => {
      document.getElementById("header").innerHTML = data;
    });

  fetch("footer.html")
    .then(res => res.text())
    .then(data => {
      document.getElementById("footer").innerHTML = data;
    });
</script>

</body>
</html>
